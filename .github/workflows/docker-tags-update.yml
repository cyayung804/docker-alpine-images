---
name: Docker tags update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8,20 * * *'
      timezone: "Asia/Singapore"

permissions:
  contents: write

env:
  TZ: "Asia/Singapore"

jobs:
  docker-tags-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bash script
        run: |
          make install
          make update image=alpine

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and push changes
        run: |
          git config --local user.email "cyayung804@gmail.com"
          git config --local user.name "cyayung804"
          git add -A
          git commit -S -m "Scheduled file updates: Run update.sh" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
