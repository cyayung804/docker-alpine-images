---
inputs:
  gpg_private_key:
    description: GPG armor export secret key
    required: true
  gpg_passphase:
    description: GPG private key passphase
    required: true

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        echo "${{ inputs.gpg_private_key }}" | gpg --batch --import
        KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5}' | head -n 1)
        git config --global user.signingkey "$KEY_ID"
        git config --global commit.gpgsign true
        git config --global gpg.program "gpg --batch --pinentry-mode loopback --passphrase ${{ inputs.gpg_passphase }}"
